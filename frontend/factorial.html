<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
        <title>Factorial Visualizer</title>
        <link rel="stylesheet" href="factorial-style.css" />
    </head>
    <body>
        <header class="navbar">
            <div class="nav-container">
                <h1 class="logo"></h1>
                <nav>
                    <ul class="nav-links">
                        <li><a href="/">Home</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <main class="container">
            <section class="hero">
                <h2>Factorial Recursion</h2>
                <p class="hero text">
                    Enter a number (0-10) to view the recursive call stack
                    that evaluates the factorial. 
                </p>
            </section>
            <section class="section">
                <label for="number">Enter n:</label>
                <input type="number" id="number" min="0" max="10" />
                <button id="runBtn">Run</button>
            </section>
            <section class="section">
                <h3>Execution steps</h3>
                <div id="output"></div>
            </section>
        </main>
        <script>
            const runBtn = document.getElementById("runBtn");
            const outputDiv = document.getElementById("output");
            runBtn.addEventListener("click", async () => {
                const n = parseInt(document.getElementById("number").value);

                if (isNaN(n)) {
                    outputDiv.innerHTML = "<p>Please enter a number</p>";
                    return;
                }
                outputDiv.innerHTML = "<p>Running.....</p>";
                try {
                    const response = await fetch("/api/factorial", {
                        method: "POST",
                        headers: {
                            "content-type":"application/json"
                        },
                        body: JSON.stringify({n:n})
                    });
                    const data = await response.json();
                    outputDiv.innerHTML = "";
                    const stack = [];
                    for (const step of data.steps){
                        const container = document.createElement("div");
                        container.style.marginLeft = `${step.depth * 20}px`;
                        const header = document.createElement("p");
                        const details = document.createElement("div");
                        const p = document.createElement("p");
                        p.textContent = "";
                        p.style.display = "none";
                        if (step.action === "call"){
                            header.textContent = `${step.action.toUpperCase()}: ${step.value}`;
                            container.appendChild(header);  
                            header.style.cursor = "pointer";
                        
                            details.style.display = "none";
                            
                            if (step.n <= 1){
                                details.textContent = `factorial(${step.n}) = 1`;

                            } else {
                                details.textContent = `factorial(${step.n})= ${step.n} * Result of factorial(${step.n - 1})
                                `;
                                
                            }
                        header.addEventListener("click", () => {
                            details.style.cursor = "pointer";
                            details.style.display = 
                                details.style.display === "none" ? "block" : "none";
                            }
                        )
                        details.addEventListener("click", () => {
                                    p.style.display = 
                                        p.style.display === "none" ? "block" : "none"; 
                                    }
                            )
                        details.appendChild(p)
                        container.appendChild(details);
                        stack.push({
                            returnElem: p
                        })
                        }
                        if (step.action === "return"){
                            const frame = stack.pop();
                            frame.returnElem.textContent = `Returns ${step.returnVal}`;

                        }   
                    outputDiv.appendChild(container);
                    }
                } catch (error) {
                    outputDiv.innerHTML = "<p>Error calling API</p>";
                    console.error(error);
                }
            });
        </script>
    </body>
    <footer></footer>
</html>
