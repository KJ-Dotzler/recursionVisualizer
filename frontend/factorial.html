<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" /> 
        <title>Factorial Visualizer</title>
        <link rel="stylesheet" href="factorial-style.css" />
    </head>
    <body>
        <header class="navbar">
            <div class="nav-container">
                <h1 class="logo"></h1>
                <nav>
                    <ul class="nav-links">
                        <li><a href="/">Home</a></li>
                    </ul>
                </nav>
            </div>
        </header>
        <main class="container">
            <section class="hero">
                <h2>Factorial Recursion</h2>
                <p class="hero text">
                    Enter a number (0-10) to view the recursive call stack
                    that evaluates the factorial. 
                </p>
            </section>
            <section class="section">
                <label for="number">Enter n:</label>
                <input type="number" id="number" min="0" max="10" />
                <button id="runBtn">Run</button>
                <button id="stepBtn" disabled>Step</button>
            </section>
            <section class="section">
                <h3>Execution steps</h3>
                <!--output pre for renderCode func
                <pre id="codePanel">
                    1: def factorial(n):
                    2:    if n <= 1:
                    3:        return 1
                    4:    return n * factorial(n - 1)
                </pre>
            -->
                <!--changing to single div for line by line code output?-->
                <div id="codePanel" class="code-panel"></div>
                <!--output for renderVariables func-->
                
                <div id="varPanel">Variables</div>

                <!--output div for run button-->
                <div id="output"></div>

                <!--output div for step button/visualization-->
                <div class="visualizer">
                    <div id="callTree"></div>
                    <div id="stackPanel">
                        <h4>Call Stack</h4>
                        <div id="stackVisual"></div>
                    </div>
                </div>
            </section>
        </main>
        <script>

            // --- Globals/Constants ---
            const runBtn = document.getElementById("runBtn");
            const stepBtn = document.getElementById("stepBtn");
            const stackVisual = document.getElementById("stackVisual");
            const outputDiv = document.getElementById("output");
            const callTree = document.getElementById("callTree");
            const codePanel = document.getElementById("codePanel");
            const varPanel = document.getElementById("varPanel");
            const stack = [];
            //let origCode = codePanel.innerText.trim();
            const codeLines = [
                "1: def factorial(n):",
                "2:     if n <= 1:",
                "3:         return 1",
                "4:     return n * factorial(n - 1)"
            ];
            let steps = [];
            let currentStep = 0;

            // --- Functions ---

            // --- create code panel ---
            function initCodePanel(){
                codePanel.innerHTML = "";

                for (let line of codeLines){
                    const div = document.createElement("div");
                    div.classList.add("code-line");
                    const lineNumber = line.split(":")[0];
                    div.dataset.line = lineNumber;
                    div.textContent = line;
                    codePanel.appendChild(div);
                }
            }

            // --- update frame ---
            function updateActiveFrame(){
                const frames = stackVisual.children;
                for (let frame of frames){
                    frame.classList.remove("active");
                }
                if (frames.length > 0){
                    frames[frames.length-1].classList.add("active");
                }
            }

            // --- Render functions ---
            function renderDescription(step){
                outputDiv.innerHTML = step.description;
            }

            function renderStack(step){
                if (step.event === "call"){
                    const frame = document.createElement("div");
                    frame.classList.add("stack-frame");
                    frame.textContent = `factorial(${step.n})`;

                    stackVisual.appendChild(frame);

                    stack.push({
                        elem : frame,
                        n : step.n
                    });

                    updateActiveFrame();
                }

                if (step.event === "return"){
                    const frameObj = stack.pop();
                    
                    if (!frameObj){
                        return
                    }

                    frameObj.elem.textContent = 
                    `factorial(${step.n}) = ${step.returnVal}`;

                    frameObj.elem.classList.add("resolved");

                    updateActiveFrame();
                }
            }

            function renderCode(step){
                /*const lines = origCode.split("\n");

                const highlighted = lines.map(line => {
                    if (line.trim().startsWith(step.line + ":")){
                        return ">> " + line.trim();
                    }

                    return "    " + line.trim();
                });

                codePanel.innerText = highlighted.join("\n");*/
                const lines = codePanel.children;

                for (let line of lines){
                    line.classList.remove("active");
                }

                const active = codePanel.querySelector(
                    `[data-line="${step.line}"]`
                );

                if (active){
                    active.classList.add("active");
                }
            }

            function renderVariables(step){
                let text = `n = ${step.n}`;
                if (step.returnVal !== null &&
                    step.returnVal !== undefined){
                        text += `<br>return = ${step.returnVal}`;
                    }
                varPanel.innerHTML = text;
            }

            // --- Execute Step ---
            function executeStep() {
                /*same thing, will keep old function code until restructure runs/works
                if (currentStep >= steps.length){
                    stepBtn.disabled = true;
                    return;
                    }
                const step = steps[currentStep];
                if (step.action === "call"){
                    handleCall(step);
                    }
                if (step.action === "return"){
                    handleReturn(step);
                    }
                currentStep++;*/
                if (currentStep >= steps.length){
                    stepBtn.disabled = true;
                    return;
                    }
                const step = steps[currentStep];

                renderDescription(step);
                renderStack(step);
                renderCode(step);
                renderVariables(step);

                currentStep++;

            }


            // --- handle call actions ---      
            /* no longer handling calls, displaying backend function state instead, will keep here for now
            after restructure delete
            function handleCall(step) {
                const frame = document.createElement("div");
                frame.classList.add("stack-frame");
                if (step.n <= 1){
                    frame.textContent = `factorial(${step.n}) = 1`;
                }
                else {
                    frame.textContent = `factorial(${step.n}) = ${step.n} * factorial(${step.n-1})`;
                }
                stackVisual.appendChild(frame);

                setTimeout(()=>{
                    frame.classList.add("show");
                }, 10);

                stack.push({
                    element: frame,
                    n: step.n
                });
            }

            // --- handle return actions ---
            function handleReturn(step) {
                //remove frame object from stack
                const frameObj = stack.pop();
                //if there is no object return, error handling
                if (!frameObj) return;
                //the actual stack frame is the HTML element we saved in the JSON object
                const frame = frameObj.element;
                const n = frameObj.n;

                if (n<=1){
                    frame.textContent = `factorial(${n}) = 1`;
                } else {
                    const childVal = step.returnVal / n;
                    frame.textContent = 
                    `factorial(${n}) = ${n} * ${childVal} = ${step.returnVal}`;
                }
                frame.classList.add("resolved");
            }
*/
            // --- Listeners ---
            // step button, uses functions to display stack frames
            stepBtn.addEventListener("click", executeStep);
            
            //run button only gets the data and resets display and state 
            runBtn.addEventListener("click", async () => {
                const n = parseInt(document.getElementById("number").value);

                if (isNaN(n)) {
                    outputDiv.innerHTML = "<p>Please enter a number</p>";
                    return;
                }
                outputDiv.innerHTML = "<p>Loading.....</p>";
                try {
                    const response = await fetch("/api/factorial", {
                        method: "POST",
                        headers: {
                            "content-type":"application/json"
                        },
                        body: JSON.stringify({n:n})
                    });
                    const data = await response.json();

                    // --- state reset ---
                    steps = data.steps;
                    currentStep = 0;
                    stack.length = 0;
                    // --- clear fields ---
                    outputDiv.innerHTML = "";
                    stackVisual.innerHTML = "";
                    callTree.innerHTML = "";
                    varPanel.innerHTML = "Variables";
                    // --- init code panel ---
                    initCodePanel()

                    // --- show the step button ---
                    stepBtn.disabled = false;
                   
                } catch (error) {
                    outputDiv.innerHTML = "<p>Error calling API</p>";
                    console.error(error);
                }
            });
        </script>
    </body>
    <footer></footer>
</html>
